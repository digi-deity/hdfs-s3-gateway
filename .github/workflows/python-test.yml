name: python-test

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - "*"

defaults:
  run:
    working-directory: ./python

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Download Hadoop
        run: |
          wget -q https://dlcdn.apache.org/hadoop/common/hadoop-3.5.0/hadoop-3.5.0.tar.gz
          tar -xf hadoop-3.5.0.tar.gz -C $GITHUB_WORKSPACE
          echo "$GITHUB_WORKSPACE/hadoop-3.5.0/bin" >> $GITHUB_PATH

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        # Install the `test` extra so `pytest` (the only third-party test dependency,
        # declared under [project.optional-dependencies]) is present for `uv run pytest`.
        # `uv sync` does NOT install optional extras by default, which is why pytest was
        # missing and the suite failed to run.
        run: uv sync --extra test

      - uses: PyO3/maturin-action@v1
        with:
          command: develop
          features: test-hooks
          sccache: 'true'
          container: 'off'
          working-directory: ./python

      - name: Run tests
        run: |
          uv run pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --find-interpreter --manifest-path python/Cargo.toml
          sccache: 'true'
          manylinux: auto

      - name: Upload wheels
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v5
        with:
          name: wheels
          path: dist
