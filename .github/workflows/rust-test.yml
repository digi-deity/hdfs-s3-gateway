name: rust-test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "*"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt -- --check

  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check (no default features)
        run: cargo check --tests

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --lib

  test-integration:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: -C debuginfo=1
      RUST_BACKTRACE: "1"
      RUST_LOG: debug
      # HADOOP_HOME is set here so every run: step inherits it without repetition.
      # The directory name matches what the lean tarball extracts to (hadoop-3.4.2/).
      HADOOP_HOME: ${{ github.workspace }}/hadoop-3.4.2

    steps:
      - uses: actions/checkout@v5

      - name: Install minimal stable with clippy and rustfmt
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install native libs
        # maven is needed by MiniDfs::with_features to compile and launch the
        # embedded MiniDFSCluster Java harness; libkrb5-dev/krb5-user are needed
        # for the Kerberos integration paths and for building the krb5 Rust crate.
        run: sudo apt-get install -y libkrb5-dev krb5-user maven

      - name: Set up JDK
        # Use Java 17, matching the version validated by the upstream hdfs-native
        # project for MiniDFS integration tests.
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download Hadoop
        # Use Hadoop 3.4.2-lean to match the version validated by the upstream
        # hdfs-native project.  The lean tarball extracts to hadoop-3.4.2/.
        run: |
          wget -q https://dlcdn.apache.org/hadoop/common/hadoop-3.4.2/hadoop-3.4.2-lean.tar.gz
          tar -xf hadoop-3.4.2-lean.tar.gz -C $GITHUB_WORKSPACE
          echo "$GITHUB_WORKSPACE/hadoop-3.4.2/bin" >> $GITHUB_PATH

      - name: Verify Java/Hadoop/Maven tooling
        # Confirm all prerequisites are visible before spending time on a Cargo build.
        run: |
          java -version
          mvn --version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "HADOOP_HOME=$HADOOP_HOME"
          ls "$HADOOP_HOME/bin/hdfs"

      # Start ONE MiniDFSCluster in the environment (bash), before the tests run. Every
      # integration test binary then connects to this shared cluster via HDFS_NAMENODE_URI
      # instead of spawning its own (which previously forced a (re)start per test file and
      # clobbered the shared `target/test/data/dfs` work dir). Mirrors the Python CI flow.
      #
      # The harness is generated by hdfs-native's build.rs ONLY when the `integration-test`
      # feature is compiled, so we enable it explicitly here (the test binaries themselves
      # no longer depend on that feature) and launch the harness in the background.
      - name: Start MiniDFS cluster
        working-directory: ${{ github.workspace }}
        run: |
          cargo test --lib --no-run --features hdfs-native/integration-test
          HARNESS=$(ls -d target/debug/build/hdfs-native-*/out/minidfs | head -1)
          echo "MiniDFS harness: $HARNESS"

          # The harness blocks on stdin (readLine) after printing "Ready!", so we keep
          # a held-open pipe as its stdin to stop it from exiting immediately.
          mkfifo /tmp/minidfs_stdin
          sleep 100000 > /tmp/minidfs_stdin &
          echo $! > /tmp/minidfs_stdin_holder.pid

          mvn -q compile exec:java -f "$HARNESS/pom.xml" < /tmp/minidfs_stdin > /tmp/minidfs.log 2>&1 &
          echo $! > /tmp/minidfs.pid

          for i in $(seq 1 90); do
            if grep -q "Ready!" /tmp/minidfs.log; then echo "MiniDFS ready"; break; fi
            sleep 2
          done
          if ! grep -q "Ready!" /tmp/minidfs.log; then
            echo "MiniDFS failed to start:"; cat /tmp/minidfs.log; exit 1
          fi

          # The non-secure harness serves the NameNode RPC at this fixed address.
          echo "HDFS_NAMENODE_URI=hdfs://127.0.0.1:9000" >> "$GITHUB_ENV"

      # Run every integration test file. They share the single cluster started above and
      # each isolate their fixtures under a unique HDFS root (cleaned up on drop), so the
      # *binaries* run in parallel. Within a binary we keep `--test-threads=1`: the
      # `list_objects_v2_large_dir` case dominates the wall time and runs alone anyway, so
      # intra-binary parallelism buys nothing, and serializing is the safe choice.
      - name: Run integration tests (integration)
        run: cargo test --test integration -- --test-threads=1

      - name: Run integration tests (conformance)
        run: cargo test --test conformance -- --test-threads=1

      - name: Run integration tests (graceful_shutdown)
        run: cargo test --test graceful_shutdown -- --test-threads=1

      - name: Run integration tests (backpressure_test)
        run: cargo test --test backpressure_test -- --test-threads=1

      # Concurrency/throughput hardening. Slower and noisier than the others, so it gets
      # its own step with a longer timeout. The 64-way request concurrency it asserts is
      # real (spawned inside the test on the gateway's runtime).
      - name: Run integration tests (load)
        timeout-minutes: 20
        run: cargo test --test load -- --test-threads=1

      - name: Stop MiniDFS cluster
        if: always()
        run: |
          [ -f /tmp/minidfs.pid ] && kill "$(cat /tmp/minidfs.pid)" 2>/dev/null || true
          [ -f /tmp/minidfs_stdin_holder.pid ] && kill "$(cat /tmp/minidfs_stdin_holder.pid)" 2>/dev/null || true
          rm -f /tmp/minidfs_stdin
